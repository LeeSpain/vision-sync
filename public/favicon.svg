<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0d7ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- V letterform — two thick strokes forming a clean V -->
  <path d="M13 16 L32 50 L51 16" fill="none" stroke="url(#letter)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
