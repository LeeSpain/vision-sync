<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d7ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Purple glow overlay -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Logo mark — rounded square with gradient V -->
  <rect x="88" y="215" width="120" height="120" rx="26" ry="26" fill="url(#vGrad)"/>
  <rect x="88" y="215" width="120" height="120" rx="26" ry="26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <path d="M107 243 L148 303 L189 243" fill="none" stroke="url(#letterGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand name -->
  <text x="240" y="282" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Vision-Sync</text>
  <text x="240" y="342" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="300" fill="#a78bfa">Forge</text>

  <!-- Tagline -->
  <text x="88" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0.5">AI Agents, Chatbots &amp; Intelligent Automation</text>

  <!-- Accent divider line -->
  <rect x="88" y="448" width="480" height="2" fill="url(#accentLine)" rx="1"/>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500">
    <rect x="88" y="470" width="148" height="36" rx="18" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="162" y="493" text-anchor="middle" fill="#a78bfa">Enterprise AI</text>

    <rect x="252" y="470" width="138" height="36" rx="18" fill="rgba(79,70,229,0.2)" stroke="rgba(79,70,229,0.4)" stroke-width="1"/>
    <text x="321" y="493" text-anchor="middle" fill="#818cf8">24/7 Agents</text>

    <rect x="406" y="470" width="148" height="36" rx="18" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="480" y="493" text-anchor="middle" fill="#a78bfa">Automation</text>
  </g>

  <!-- Bottom URL strip -->
  <rect x="0" y="578" width="1200" height="52" fill="rgba(0,0,0,0.3)"/>
  <text x="88" y="610" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="rgba(148,163,184,0.7)" letter-spacing="1">vision-sync.co</text>
</svg>
